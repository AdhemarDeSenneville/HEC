defaults:
  - override hydra_logging: colorlog
  - override job_logging: colorlog
  - override launcher: joblib # No dynamic parallelism
  #- override launcher: ray # Dynamic parallelism - not working

run: 
  dir: ${PATH_logs}/${task_name}/${sub_task_name}/${now:%m-%d}/${now:%H-%M-%S}
sweep:
  dir: ${PATH_logs}/${task_name}/${sub_task_name}/${now:%m-%d}/${now:%H-%M-%S}
  subdir: ${hydra.job.num}

launcher:
  # JOBLIB
  n_jobs: 6 # Only MULTYRUN

job_logging:
  handlers:
    file:
      # Incorporates fix from https://github.com/facebookresearch/hydra/pull/2242
      filename: ${hydra.runtime.output_dir}/run.log

callbacks:
  log_job_return:
    _target_: hydra.experimental.callbacks.LogJobReturnCallback